[project]
name = "ogb-ux-profile-author"
version = "0.1.1"
description = "Checkout-only Textual authoring tool for OGB UX profile snapshots."
requires-python = ">=3.9"
dependencies = [
  "textual>=0.89",
  "pytest>=8",
]

[project.scripts]
ogb-ux-profile-author = "ogb_ux_profile_author.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ogb_ux_profile_author"]
