name: Validate OpenCode Gemini Bridge

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: artifacts/bridge-cli-skeleton/package-lock.json
      - name: Install
        working-directory: artifacts/bridge-cli-skeleton
        run: npm ci
      - name: Typecheck
        working-directory: artifacts/bridge-cli-skeleton
        run: npm run typecheck
      - name: Test
        working-directory: artifacts/bridge-cli-skeleton
        run: npm test
      - name: Build
        working-directory: artifacts/bridge-cli-skeleton
        run: npm run build
      - name: Syntax check TUI plugin
        working-directory: artifacts/bridge-cli-skeleton
        run: node --check dist/tui-sidebar.js
      - name: Syntax check shell installers
        run: |
          bash -n artifacts/scripts/install-mac.sh
          bash -n artifacts/scripts/bootstrap-mac.sh
          bash -n artifacts/scripts/upgrade-mac.sh
          bash -n artifacts/scripts/uninstall-mac.sh
      - name: Syntax check PowerShell installers
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content artifacts/scripts/install-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content artifacts/scripts/bootstrap-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
      - name: CLI smoke test
        run: |
          mkdir -p "$RUNNER_TEMP/ogb-smoke"
          printf 'Smoke rules\n' > "$RUNNER_TEMP/ogb-smoke/GEMINI.md"
          node artifacts/bridge-cli-skeleton/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" init
          node artifacts/bridge-cli-skeleton/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" sync --rulesync off
          node artifacts/bridge-cli-skeleton/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" validate
          node artifacts/bridge-cli-skeleton/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" security-check
          node artifacts/bridge-cli-skeleton/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" bridge --no-refresh
      - name: Pack dry run
        working-directory: artifacts/bridge-cli-skeleton
        run: npm pack --dry-run
