name: Validate OpenCode Gemini Bridge

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/ogb/package-lock.json
      - name: Install
        working-directory: packages/ogb
        run: npm ci
      - name: Typecheck
        working-directory: packages/ogb
        run: npm run typecheck
      - name: Test
        working-directory: packages/ogb
        run: npm test
      - name: Build
        working-directory: packages/ogb
        run: npm run build
      - name: Syntax check TUI plugin
        working-directory: packages/ogb
        run: node --check dist/tui-sidebar.js
      - name: Syntax check shell installers
        run: |
          bash -n scripts/install-mac.sh
          bash -n scripts/bootstrap-mac.sh
          bash -n artifacts/scripts/bootstrap-mac.sh
          bash -n scripts/upgrade-mac.sh
          bash -n scripts/uninstall-mac.sh
      - name: Syntax check PowerShell installers
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content install.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/install-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/bootstrap-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content artifacts/scripts/bootstrap-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
      - name: CLI smoke test
        run: |
          mkdir -p "$RUNNER_TEMP/ogb-smoke"
          printf 'Smoke rules\n' > "$RUNNER_TEMP/ogb-smoke/GEMINI.md"
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" init
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" setup-ux --dry-run --no-install-opencode --no-plugins
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" self-update --dry-run --no-setup --no-ux --no-install-opencode
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" sync --rulesync off
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" validate
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" security-check
          node packages/ogb/dist/cli.js --project "$RUNNER_TEMP/ogb-smoke" bridge --no-refresh
      - name: Pack dry run
        working-directory: packages/ogb
        run: npm pack --dry-run
      - name: Validate schemas exist
        run: test -f packages/ogb/schemas/inventory.schema.json && test -f packages/ogb/schemas/gemini-extension-compat.schema.json
