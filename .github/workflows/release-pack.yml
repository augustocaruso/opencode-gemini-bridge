name: Release Pack

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/ogb/package-lock.json
      - name: Install
        working-directory: packages/ogb
        run: npm ci
      - name: Restore private telemetry defaults
        env:
          OGB_TELEMETRY_DEFAULTS_JSON: ${{ secrets.OGB_TELEMETRY_DEFAULTS_JSON }}
        run: |
          if [ -z "${OGB_TELEMETRY_DEFAULTS_JSON:-}" ]; then
            echo "No private telemetry defaults configured."
            exit 0
          fi
          umask 077
          printf '%s\n' "$OGB_TELEMETRY_DEFAULTS_JSON" > packages/ogb/telemetry.defaults.json
          node -e "const fs=require('node:fs'); const p='packages/ogb/telemetry.defaults.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); if (j.schema !== 'opencode-gemini-bridge.telemetry-defaults.v1' || j.enabled !== true || !j.endpoint_url || !j.auth_token) throw new Error('invalid OGB telemetry defaults secret');"
      - name: Build
        working-directory: packages/ogb
        run: npm run build
      - name: Test
        working-directory: packages/ogb
        run: npm test
      - name: Create npm tarball
        working-directory: packages/ogb
        run: npm pack
      - name: Create source zip
        run: zip -r opencode-gemini-bridge-pack.zip . -x '*.git*' '*/node_modules/*' '*.tgz'
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: opencode-gemini-bridge-pack
          path: |
            opencode-gemini-bridge-pack.zip
            packages/ogb/opencode-gemini-bridge-*.tgz
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            opencode-gemini-bridge-pack.zip
            packages/ogb/opencode-gemini-bridge-*.tgz
